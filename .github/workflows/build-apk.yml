name: Build PhoneRecon APK

on:
  push:
    paths:
      - 'phone-recon/App.js'

permissions:
  contents: write

env:
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-rn073-${{ runner.os }}
          restore-keys: gradle-rn073-

      # Run init in /tmp so react-native doesn't detect the parent git repo
      # and abort the template copy step
      - name: Init React Native project
        run: |
          cd /tmp
          npx --yes react-native@0.73.6 init PhoneRecon
          echo "=== /tmp/PhoneRecon ==="
          ls /tmp/PhoneRecon/
          echo "=== /tmp/PhoneRecon/android ==="
          ls /tmp/PhoneRecon/android/

      - name: Copy App.js into project
        run: cp $GITHUB_WORKSPACE/phone-recon/App.js /tmp/PhoneRecon/App.js

      - name: Install AsyncStorage
        working-directory: /tmp/PhoneRecon
        run: npm install @react-native-async-storage/async-storage

      - name: Make gradlew executable
        run: chmod +x /tmp/PhoneRecon/android/gradlew

      - name: Build debug APK
        working-directory: /tmp/PhoneRecon/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Stage APK for release
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp /tmp/PhoneRecon/android/app/build/outputs/apk/debug/app-debug.apk \
             $GITHUB_WORKSPACE/PhoneRecon-${SHORT_SHA}.apk
          echo "APK_NAME=PhoneRecon-${SHORT_SHA}.apk" >> $GITHUB_ENV

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: PhoneRecon — Latest Build
          prerelease: true
          body: |
            **Automated build** — sideload onto any Android device.

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built:** ${{ github.event.head_commit.timestamp }}

            ### Install
            1. Transfer the APK to your Android device
            2. Settings → Install unknown apps → allow your file manager
            3. Tap the APK to install

            > Debug build — no signing required for personal use.
          files: ${{ env.APK_NAME }}
