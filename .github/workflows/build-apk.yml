name: Build PhoneRecon APK

on:
  push:
    paths:
      - 'phone-recon/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-cap-${{ runner.os }}-${{ hashFiles('phone-recon/android/**/*.gradle*') }}
          restore-keys: gradle-cap-${{ runner.os }}-

      - name: Install Capacitor dependencies
        working-directory: phone-recon
        run: npm install

      - name: Sync web assets into android
        working-directory: phone-recon
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x phone-recon/android/gradlew

      - name: Build debug APK
        working-directory: phone-recon/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Stage APK for release
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp phone-recon/android/app/build/outputs/apk/debug/app-debug.apk \
             PhoneRecon-${SHORT_SHA}.apk
          echo "APK_NAME=PhoneRecon-${SHORT_SHA}.apk" >> $GITHUB_ENV

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: PhoneRecon — Latest Build
          prerelease: true
          body: |
            **Automated build** — sideload onto any Android device.

            **Commit:** `${{ github.sha }}`
            **Built:** ${{ github.event.head_commit.timestamp }}

            ### Install
            1. Transfer the APK to your Android device
            2. Settings → Install unknown apps → allow your file manager
            3. Tap the APK to install
          files: ${{ env.APK_NAME }}
