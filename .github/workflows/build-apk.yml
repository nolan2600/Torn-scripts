name: Build PhoneRecon APK

on:
  push:
    paths:
      - 'phone-recon/App.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-rn074-${{ runner.os }}
          restore-keys: gradle-rn074-

      - name: Cache npm global
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-rn074-${{ runner.os }}

      - name: Init React Native 0.74 project
        run: npx --yes react-native@0.74 init PhoneRecon

      - name: Replace App.js with repo version
        run: cp phone-recon/App.js PhoneRecon/App.js

      - name: Install AsyncStorage
        working-directory: PhoneRecon
        run: npm install @react-native-async-storage/async-storage

      - name: Build debug APK
        working-directory: PhoneRecon/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cp PhoneRecon/android/app/build/outputs/apk/debug/app-debug.apk \
             PhoneRecon/android/app/build/outputs/apk/debug/PhoneRecon-${SHORT_SHA}.apk
          echo "APK_NAME=PhoneRecon-${SHORT_SHA}.apk" >> $GITHUB_ENV

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: PhoneRecon — Latest Build
          prerelease: true
          body: |
            **Automated build** — sideload this APK onto any Android device.

            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built:** ${{ github.event.head_commit.timestamp }}

            ### Install
            1. Transfer the APK to your Android device
            2. Settings → Install unknown apps → allow your file manager
            3. Tap the APK file to install

            > Debug build — no signing required for personal use.
          files: PhoneRecon/android/app/build/outputs/apk/debug/${{ env.APK_NAME }}
